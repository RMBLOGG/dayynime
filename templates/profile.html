{% extends "base.html" %}
{% block title %}Profile - Dayynime{% endblock %}
{% block content %}
<div style="padding:20px 16px 0;">
  <!-- Avatar header -->
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
    <div style="position:relative;">
      <div id="profileAvatarWrap" style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#c44b7a);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;border:3px solid rgba(251,114,153,0.3);box-shadow:0 4px 18px var(--pink-glow);">
        <i class="fas fa-user"></i>
      </div>
      <div id="premiumCrown" style="display:none;position:absolute;bottom:-2px;right:-2px;width:22px;height:22px;border-radius:50%;background:#fbbf24;border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;">👑</div>
    </div>
    <div style="flex:1;min-width:0;">
      <div id="profileName" style="font-family:'M PLUS Rounded 1c',sans-serif;font-size:20px;font-weight:900;color:var(--text);">Loading...</div>
      <div id="profileEmail" style="font-size:12px;color:var(--text3);margin-top:2px;"></div>
      <div id="premiumBadge" style="display:none;margin-top:5px;"><span style="background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000;font-size:9px;font-weight:900;padding:2px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px;">✨ Premium</span></div>
    </div>
  </div>

  <!-- Stats -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;">
    <div style="text-align:center;padding:12px;background:var(--bg2);border-radius:14px;border:1.5px solid var(--border2);">
      <div id="statHistory" style="font-family:'M PLUS Rounded 1c',sans-serif;font-size:20px;font-weight:900;color:var(--pink);">-</div>
      <div style="font-size:10px;color:var(--text3);font-weight:700;margin-top:2px;">Ditonton</div>
    </div>
    <div style="text-align:center;padding:12px;background:var(--bg2);border-radius:14px;border:1.5px solid var(--border2);">
      <div id="statBookmark" style="font-family:'M PLUS Rounded 1c',sans-serif;font-size:20px;font-weight:900;color:var(--blue);">-</div>
      <div style="font-size:10px;color:var(--text3);font-weight:700;margin-top:2px;">Koleksi</div>
    </div>
    <div style="text-align:center;padding:12px;background:var(--bg2);border-radius:14px;border:1.5px solid var(--border2);">
      <div id="statDays" style="font-family:'M PLUS Rounded 1c',sans-serif;font-size:20px;font-weight:900;color:var(--cyan);">-</div>
      <div style="font-size:10px;color:var(--text3);font-weight:700;margin-top:2px;">Hari Bergabung</div>
    </div>
  </div>

  <!-- Menu items -->
  <div style="display:flex;flex-direction:column;gap:8px;">
    <a href="/koleksi" style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:14px;text-decoration:none;transition:all 0.2s;">
      <div style="width:40px;height:40px;border-radius:50%;background:rgba(0,161,214,0.15);border:1.5px solid rgba(0,161,214,0.2);display:flex;align-items:center;justify-content:center;"><i class="fas fa-bookmark" style="color:var(--blue);font-size:16px;"></i></div>
      <div style="flex:1;"><div style="font-size:14px;font-weight:800;color:var(--text);">Koleksi Anime</div><div style="font-size:11px;color:var(--text3);margin-top:1px;">Daftar anime yang kamu simpan</div></div>
      <i class="fas fa-chevron-right" style="color:var(--text3);font-size:12px;"></i>
    </a>
    <a href="/premium" style="display:flex;align-items:center;gap:12px;padding:14px;background:linear-gradient(135deg,rgba(251,191,36,0.08),rgba(245,158,11,0.08));border:1.5px solid rgba(251,191,36,0.2);border-radius:14px;text-decoration:none;transition:all 0.2s;">
      <div style="width:40px;height:40px;border-radius:50%;background:rgba(251,191,36,0.15);border:1.5px solid rgba(251,191,36,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;">👑</div>
      <div style="flex:1;"><div style="font-size:14px;font-weight:800;color:var(--text);">Premium</div><div style="font-size:11px;color:var(--text3);margin-top:1px;">Nikmati tanpa iklan & HD quality</div></div>
      <i class="fas fa-chevron-right" style="color:var(--text3);font-size:12px;"></i>
    </a>
    <button onclick="openTrakteer()" style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:14px;width:100%;text-align:left;cursor:pointer;transition:all 0.2s;">
      <div style="width:40px;height:40px;border-radius:50%;background:rgba(190,30,45,0.15);border:1.5px solid rgba(190,30,45,0.2);display:flex;align-items:center;justify-content:center;font-size:16px;">❤️</div>
      <div style="flex:1;"><div style="font-size:14px;font-weight:800;color:var(--text);">Support Dayynime</div><div style="font-size:11px;color:var(--text3);margin-top:1px;">Bantu kami tetap gratis!</div></div>
      <i class="fas fa-chevron-right" style="color:var(--text3);font-size:12px;"></i>
    </button>
    <button onclick="doLogout()" style="display:flex;align-items:center;gap:12px;padding:14px;background:rgba(239,68,68,0.06);border:1.5px solid rgba(239,68,68,0.15);border-radius:14px;width:100%;text-align:left;cursor:pointer;">
      <div style="width:40px;height:40px;border-radius:50%;background:rgba(239,68,68,0.12);border:1.5px solid rgba(239,68,68,0.2);display:flex;align-items:center;justify-content:center;"><i class="fas fa-sign-out-alt" style="color:#f87171;font-size:16px;"></i></div>
      <div style="flex:1;"><div style="font-size:14px;font-weight:800;color:#f87171;">Keluar</div><div style="font-size:11px;color:var(--text3);margin-top:1px;">Logout dari akun kamu</div></div>
    </button>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
  fetch('/api/me').then(function(r){return r.json();}).then(function(d){
    if(!d.user){ window.location.href='/auth/login'; return; }
    var u=d.user;
    document.getElementById('profileName').textContent=u.name||u.username||'User';
    document.getElementById('profileEmail').textContent=u.email||'';
    var wrap=document.getElementById('profileAvatarWrap');
    if(u.avatar){wrap.innerHTML='<img src="'+u.avatar+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';}
    else{wrap.textContent=(u.name||u.username||'U')[0].toUpperCase();}
    if(u.created_at){var days=Math.floor((Date.now()-new Date(u.created_at).getTime())/86400000);document.getElementById('statDays').textContent=days;}
  }).catch(function(){window.location.href='/auth/login';});
  fetch('/api/premium/status').then(function(r){return r.json();}).then(function(d){
    if(d.premium){document.getElementById('premiumBadge').style.display='';document.getElementById('premiumCrown').style.display='flex';}
  }).catch(function(){});
  fetch('/api/history?limit=0').then(function(r){return r.json();}).then(function(d){if(d.total)document.getElementById('statHistory').textContent=d.total;}).catch(function(){});
  fetch('/api/bookmark/list').then(function(r){return r.json();}).then(function(d){if(d.bookmarks)document.getElementById('statBookmark').textContent=d.bookmarks.length;}).catch(function(){});
})();
function doLogout(){
  if(!confirm('Yakin mau keluar?')) return;
  fetch('/auth/logout',{method:'POST'}).then(function(){window.location.href='/home';}).catch(function(){window.location.href='/home';});
}
</script>
{% endblock %}
