<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dayynime - Nonton Anime Sub Indo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/png" href="/static/icon.png">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --orange: #ff6600;
      --orange2: #ff8533;
      --bg: #0a0a0a;
      --bg2: #111;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    /* ── BACKGROUND LAYERS ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden;
    }

    /* Radial glow blobs */
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.18;
      animation: blob-drift 12s ease-in-out infinite;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #ff6600, transparent 70%);
      top: -100px; left: -100px;
      animation-duration: 14s;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #ff3300, transparent 70%);
      bottom: -80px; right: -80px;
      animation-duration: 10s; animation-delay: -5s;
    }
    .blob-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #ff8800, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      animation-duration: 16s; animation-delay: -3s;
      opacity: 0.08;
    }
    @keyframes blob-drift {
      0%, 100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.97); }
    }

    /* Grid lines */
    .grid-lines {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,102,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,102,0,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    /* Particles */
    .particles { position: absolute; inset: 0; }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: #ff6600;
      border-radius: 50%;
      opacity: 0;
      animation: particle-float linear infinite;
    }
    @keyframes particle-float {
      0%   { opacity: 0; transform: translateY(100vh) scale(0); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(-20px) scale(1.5); }
    }

    /* ── MAIN CONTENT ── */
    .landing-wrap {
      position: relative; z-index: 10;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
      text-align: center;
    }

    /* Logo */
    .logo-ring {
      position: relative;
      width: 110px; height: 110px;
      margin-bottom: 28px;
      animation: logo-in 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes logo-in {
      from { opacity:0; transform: scale(0.5) rotate(-10deg); }
      to   { opacity:1; transform: scale(1) rotate(0deg); }
    }

    /* Spinning rings — ikuti bentuk rounded square logo */
    .logo-ring::before {
      content: '';
      position: absolute; inset: -7px;
      border-radius: 33px;
      border: 2px solid transparent;
      border-top-color: #ff6600;
      border-right-color: rgba(255,102,0,0.25);
      animation: ring-spin 3s linear infinite;
    }
    .logo-ring::after {
      content: '';
      position: absolute; inset: -13px;
      border-radius: 39px;
      border: 1.5px solid transparent;
      border-bottom-color: rgba(255,102,0,0.3);
      border-left-color: rgba(255,102,0,0.15);
      animation: ring-spin 5s linear infinite reverse;
    }
    @keyframes ring-spin { to { transform: rotate(360deg); } }

    .logo-img {
      width: 110px; height: 110px;
      border-radius: 26px;
      object-fit: cover;
      position: relative; z-index: 1;
      box-shadow:
        0 0 0 1px rgba(255,102,0,0.2),
        0 8px 32px rgba(255,102,0,0.3),
        0 2px 8px rgba(0,0,0,0.8);
    }

    /* Brand name */
    .brand {
      font-size: clamp(38px, 11vw, 58px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 14px;
      animation: fade-up 0.7s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    .brand span {
      background: linear-gradient(135deg, #ff6600 0%, #ff9933 50%, #ff6600 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      to { background-position: 200% center; }
    }

    /* Tagline */
    .tagline {
      font-size: clamp(13px, 3.5vw, 16px);
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      margin-bottom: 36px;
      max-width: 300px;
      animation: fade-up 0.7s 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }
    .tagline strong {
      color: rgba(255,255,255,0.85);
      font-weight: 600;
    }

    /* Stats row */
    .stats-row {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 36px;
      animation: fade-up 0.7s 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }
    .stat {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .stat-num {
      font-size: 18px; font-weight: 800; color: #ff6600;
      line-height: 1;
    }
    .stat-label {
      font-size: 10px; color: rgba(255,255,255,0.35);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .stat-divider {
      width: 1px; height: 30px;
      background: rgba(255,255,255,0.1);
    }

    /* CTA Button */
    .cta-wrap {
      animation: fade-up 0.7s 0.55s cubic-bezier(0.22,1,0.36,1) both;
      margin-bottom: 24px;
    }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 36px;
      background: linear-gradient(135deg, #ff6600, #ff4400);
      border: none; border-radius: 50px;
      color: #fff; font-size: 16px; font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer; text-decoration: none;
      position: relative; overflow: hidden;
      box-shadow:
        0 4px 24px rgba(255,102,0,0.4),
        0 1px 0 rgba(255,255,255,0.15) inset;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .cta-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
      border-radius: inherit;
    }
    .cta-btn::after {
      content: '';
      position: absolute; top: -50%; left: -60%;
      width: 40%; height: 200%;
      background: rgba(255,255,255,0.15);
      transform: skewX(-20deg);
      animation: btn-shine 3s ease-in-out infinite;
    }
    @keyframes btn-shine {
      0%   { left: -60%; opacity: 0; }
      20%  { opacity: 1; }
      40%  { left: 120%; opacity: 0; }
      100% { left: 120%; opacity: 0; }
    }
    .cta-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 32px rgba(255,102,0,0.55), 0 1px 0 rgba(255,255,255,0.15) inset;
    }
    .cta-btn:active { transform: scale(0.97); }

    .cta-btn .play-icon {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .cta-btn .play-icon i { font-size: 11px; margin-left: 2px; }

    /* Footer note */
    .foot-note {
      font-size: 11px; color: rgba(255,255,255,0.2);
      animation: fade-up 0.7s 0.65s cubic-bezier(0.22,1,0.36,1) both;
      display: flex; align-items: center; gap: 6px;
    }
    .foot-note i { color: rgba(255,102,0,0.4); font-size: 10px; }

    @keyframes fade-up {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── SCROLL INDICATOR ── */
    .scroll-hint {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      opacity: 0;
      animation: fade-up 0.7s 1.2s ease both;
      z-index: 20;
    }
    .scroll-hint span { font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; text-transform: uppercase; }
    .scroll-dot {
      width: 4px; height: 14px; border-radius: 2px;
      background: rgba(255,102,0,0.3);
      animation: scroll-bounce 1.5s ease-in-out infinite;
    }
    @keyframes scroll-bounce {
      0%,100% { transform: scaleY(1); opacity: 0.3; }
      50% { transform: scaleY(1.5); opacity: 1; }
    }

    /* Feature chips */
    .feature-chips {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      margin-bottom: 32px;
      animation: fade-up 0.7s 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    .chip {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5);
    }
    .chip i { color: #ff6600; font-size: 10px; }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg-layer">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="grid-lines"></div>
  <div class="particles" id="particles"></div>
</div>

<!-- Main -->
<div class="landing-wrap">

  <!-- Logo -->
  <div class="logo-ring">
    <img src="/static/icon.png" class="logo-img" alt="Dayynime">
  </div>

  <!-- Brand -->
  <div class="brand">Day<span>ynime</span></div>

  <!-- Tagline -->
  <p class="tagline">
    Nonton anime <strong>subtitle Indonesia</strong><br>
    terlengkap & terupdate setiap hari
  </p>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat">
      <div class="stat-num">1000+</div>
      <div class="stat-label">Judul Anime</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num">HD</div>
      <div class="stat-label">Kualitas</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num">Free</div>
      <div class="stat-label">Gratis</div>
    </div>
  </div>

  <!-- Feature chips -->
  <div class="feature-chips">
    <div class="chip"><i class="fas fa-bolt"></i> Update Cepat</div>
    <div class="chip"><i class="fas fa-shield-halved"></i> Tanpa Login</div>
    <div class="chip"><i class="fas fa-mobile-screen"></i> Mobile Friendly</div>
  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <a href="/home" class="cta-btn">
      <div class="play-icon"><i class="fas fa-play"></i></div>
      Mulai Nonton
    </a>
  </div>

  <!-- Footer note -->
  <div class="foot-note">
    <i class="fas fa-circle-check"></i>
    Gratis selamanya · Tanpa iklan berlebihan
  </div>

</div>

<script>
// Generate floating particles
const container = document.getElementById('particles');
const count = 25;
for (let i = 0; i < count; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left: ${Math.random() * 100}%;
    width: ${Math.random() * 3 + 1}px;
    height: ${Math.random() * 3 + 1}px;
    animation-duration: ${Math.random() * 10 + 8}s;
    animation-delay: ${Math.random() * 10}s;
    opacity: 0;
  `;
  container.appendChild(p);
}
</script>
</body>
</html>
