{% extends "base.html" %}
{% block title %}Genre Anime - Dayynime{% endblock %}
{% block content %}
<div class="section-wrap" style="padding-top:16px;">
  <div class="section-head">
    <div class="section-title">Jelajahi Genre</div>
  </div>
  {% if data and data.genres %}
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;">
    {% for genre in data.genres %}
    <a href="/genre/{{ genre.slug }}" style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:14px;text-decoration:none;transition:all 0.2s;overflow:hidden;position:relative;">
      <div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,rgba(251,114,153,0.2),rgba(196,75,122,0.2));border:1.5px solid rgba(251,114,153,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">🎌</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ genre.name }}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px;">Lihat Anime <i class="fas fa-arrow-right" style="font-size:9px;"></i></div>
      </div>
    </a>
    {% endfor %}
  </div>
  {% else %}
  <div style="text-align:center;padding:40px 20px;color:var(--text3);">
    <i class="fas fa-tag" style="font-size:36px;margin-bottom:12px;display:block;"></i>
    <div>Genre tidak tersedia</div>
  </div>
  {% endif %}
</div>
{% endblock %}
