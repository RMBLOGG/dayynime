<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Dayynime</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/png" href="/static/icon.png">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #0d0d0d; --bg2: #161616; --bg3: #1e1e1e;
      --accent: #e8415a; --accent-dim: rgba(232,65,90,0.12);
      --text: #f0f0f0; --text2: #aaa; --text3: #666;
      --border: rgba(255,255,255,0.07); --radius: 14px;
    }
    html, body { min-height:100%; background:var(--bg); color:var(--text); font-family:'Poppins',sans-serif; }
    .blob { position:fixed; border-radius:50%; filter:blur(80px); opacity:0.15; pointer-events:none; z-index:0; }
    .blob-1 { width:400px; height:400px; background:radial-gradient(circle,#e8415a,transparent 70%); top:-100px; left:-100px; }
    .blob-2 { width:300px; height:300px; background:radial-gradient(circle,#ff3300,transparent 70%); bottom:-80px; right:-80px; }

    .page { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 16px; }

    .logo { margin-bottom:28px; text-align:center; }
    .logo img { width:48px; height:48px; border-radius:12px; }
    .logo-name { font-size:22px; font-weight:800; color:var(--text); margin-top:8px; letter-spacing:-0.5px; }
    .logo-sub { font-size:11px; color:var(--text3); margin-top:2px; }

    .card { width:100%; max-width:360px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:28px 22px; }

    .card h2 { font-size:18px; font-weight:800; color:var(--text); margin-bottom:4px; }
    .card p  { font-size:12px; color:var(--text2); margin-bottom:22px; }

    .field { margin-bottom:14px; }
    .field label { display:block; font-size:11px; font-weight:700; color:var(--text2); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
    .field input {
      width:100%; padding:11px 14px; background:var(--bg3); border:1px solid var(--border);
      border-radius:10px; color:var(--text); font-size:14px; font-family:'Poppins',sans-serif;
      outline:none; transition:border-color .2s;
    }
    .field input:focus { border-color:var(--accent); }

    .tabs { display:flex; gap:0; margin-bottom:22px; border-radius:10px; overflow:hidden; border:1px solid var(--border); }
    .tab-btn { flex:1; padding:9px; font-size:12px; font-weight:700; cursor:pointer; border:none; background:transparent; color:var(--text3); font-family:'Poppins',sans-serif; transition:all .2s; }
    .tab-btn.active { background:var(--accent-dim); color:var(--accent); }

    .btn-main {
      width:100%; padding:13px; background:var(--accent); color:#fff; border:none;
      border-radius:10px; font-size:14px; font-weight:800; cursor:pointer;
      font-family:'Poppins',sans-serif; letter-spacing:0.3px; transition:opacity .2s;
      margin-top:6px;
    }
    .btn-main:hover { opacity:0.88; }
    .btn-main:disabled { opacity:0.5; cursor:not-allowed; }

    .divider { display:flex; align-items:center; gap:10px; margin:18px 0; }
    .divider span { font-size:11px; color:var(--text3); white-space:nowrap; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }

    .admin-field { display:none; }
    .admin-field.show { display:block; }

    .error-box { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:10px 12px; font-size:12px; color:#f87171; margin-bottom:14px; display:none; }
    .error-box.show { display:block; }

    .footer-link { text-align:center; font-size:12px; color:var(--text3); margin-top:20px; }
    .footer-link a { color:var(--accent); font-weight:700; text-decoration:none; }

    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Tab: admin token field */
    #adminSection { display:none; }
    #adminSection.show { display:block; }
    #userSection { display:block; }
    #userSection.hide { display:none; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="page">
    <div class="logo">
      <img src="/static/icon.png" alt="Dayynime">
      <div class="logo-name">Dayynime</div>
      <div class="logo-sub">Nonton Anime Sub Indo</div>
    </div>

    <div class="card">
      <h2>Masuk</h2>
      <p>Masuk ke akun kamu untuk melanjutkan.</p>

      <!-- Tab: User / Admin -->
      <div class="tabs">
        <button class="tab-btn active" id="tabUser" onclick="switchTab('user')">
          <i class="fas fa-user"></i> User
        </button>
        <button class="tab-btn" id="tabAdmin" onclick="switchTab('admin')">
          <i class="fas fa-shield-alt"></i> Admin
        </button>
      </div>

      <div class="error-box" id="errorBox"></div>

      <!-- Form User -->
      <div id="userSection">
        <div class="field">
          <label>Email / Username</label>
          <input type="text" id="emailInput" placeholder="email atau username kamu" autocomplete="username">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="passInput" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-main" id="loginBtn" onclick="doLogin()">
          Masuk
        </button>
      </div>

      <!-- Form Admin -->
      <div id="adminSection">
        <div class="field">
          <label>Token Admin</label>
          <input type="password" id="tokenInput" placeholder="Masukkan token admin" autocomplete="off">
        </div>
        <button class="btn-main" id="adminBtn" onclick="doAdminLogin()">
          Masuk sebagai Admin
        </button>
      </div>

      <div class="footer-link" id="registerLink">
        Belum punya akun? <a href="/auth/register">Daftar sekarang</a>
      </div>
    </div>
  </div>

  <script>
    function switchTab(mode) {
      var isAdmin = (mode === 'admin');
      document.getElementById('tabUser').classList.toggle('active', !isAdmin);
      document.getElementById('tabAdmin').classList.toggle('active', isAdmin);
      document.getElementById('userSection').classList.toggle('hide', isAdmin);
      document.getElementById('adminSection').classList.toggle('show', isAdmin);
      document.getElementById('registerLink').style.display = isAdmin ? 'none' : '';
      clearError();
    }

    function showError(msg) {
      var box = document.getElementById('errorBox');
      box.textContent = msg;
      box.classList.add('show');
    }
    function clearError() {
      document.getElementById('errorBox').classList.remove('show');
    }

    function setLoading(btnId, loading) {
      var btn = document.getElementById(btnId);
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Masuk...';
      } else {
        btn.disabled = false;
        btn.innerHTML = btn.id === 'adminBtn' ? 'Masuk sebagai Admin' : 'Masuk';
      }
    }

    function doLogin() {
      clearError();
      var email = document.getElementById('emailInput').value.trim();
      var pass  = document.getElementById('passInput').value;
      if (!email || !pass) { showError('Isi email/username dan password dulu.'); return; }
      setLoading('loginBtn', true);
      fetch('/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: email, password: pass})
      }).then(function(r){ return r.json(); }).then(function(d) {
        if (d.ok) {
          window.location.href = d.redirect || '/home';
        } else {
          showError(d.error || 'Login gagal.');
          setLoading('loginBtn', false);
        }
      }).catch(function() {
        showError('Koneksi bermasalah, coba lagi.');
        setLoading('loginBtn', false);
      });
    }

    function doAdminLogin() {
      clearError();
      var token = document.getElementById('tokenInput').value.trim();
      if (!token) { showError('Masukkan token admin dulu.'); return; }
      setLoading('adminBtn', true);
      fetch('/auth/login/admin', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({token: token})
      }).then(function(r){ return r.json(); }).then(function(d) {
        if (d.ok) {
          window.location.href = d.redirect || '/admin';
        } else {
          showError(d.error || 'Token tidak valid.');
          setLoading('adminBtn', false);
        }
      }).catch(function() {
        showError('Koneksi bermasalah, coba lagi.');
        setLoading('adminBtn', false);
      });
    }

    // Enter key support
    document.addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return;
      if (document.getElementById('adminSection').classList.contains('show')) {
        doAdminLogin();
      } else {
        doLogin();
      }
    });
  </script>
</body>
</html>
