<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - Dayynime</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/png" href="/static/icon.png">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{--bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2e;--pink:#fb7299;--pink-dim:rgba(251,114,153,0.15);--pink-glow:rgba(251,114,153,0.3);--text:#f0f0f8;--text2:#b0b0cc;--text3:#6060a0;--border:rgba(251,114,153,0.12);--border2:rgba(255,255,255,0.07);--radius:14px;}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 20% 30%,rgba(251,114,153,0.08) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 70%,rgba(0,161,214,0.06) 0%,transparent 60%);}
    .page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}
    .logo{margin-bottom:28px;text-align:center;}
    .logo-icon{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,#fb7299,#c44b7a);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;box-shadow:0 8px 28px var(--pink-glow);}
    .logo-name{font-family:'M PLUS Rounded 1c',sans-serif;font-size:24px;font-weight:900;color:#fff;letter-spacing:-0.5px;}
    .logo-name span{color:var(--pink);}
    .logo-sub{font-size:11px;color:var(--text3);margin-top:2px;}
    .card{width:100%;max-width:360px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:28px 22px;}
    .card h2{font-family:'M PLUS Rounded 1c',sans-serif;font-size:20px;font-weight:900;color:var(--text);margin-bottom:4px;}
    .card p{font-size:12px;color:var(--text2);margin-bottom:22px;}
    .tabs{display:flex;gap:0;margin-bottom:22px;border-radius:50px;overflow:hidden;border:1.5px solid var(--border2);}
    .tab-btn{flex:1;padding:9px;font-size:12px;font-weight:800;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'Nunito',sans-serif;transition:all .2s;}
    .tab-btn.active{background:var(--pink-dim);color:var(--pink);}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:11px;font-weight:800;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
    .field input{width:100%;padding:12px 16px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:50px;color:var(--text);font-size:14px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border-color .2s,box-shadow .2s;}
    .field input:focus{border-color:var(--pink);box-shadow:0 0 0 3px var(--pink-dim);}
    .btn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--pink),#c44b7a);color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;letter-spacing:0.3px;transition:transform .2s,box-shadow .2s;margin-top:6px;box-shadow:0 4px 18px var(--pink-glow);}
    .btn-main:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--pink-glow);}
    .btn-main:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
    .error-box{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:10px 14px;font-size:12px;color:#f87171;margin-bottom:14px;display:none;}
    .error-box.show{display:block;}
    .footer-link{text-align:center;font-size:12px;color:var(--text3);margin-top:20px;}
    .footer-link a{color:var(--pink);font-weight:800;text-decoration:none;}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #adminSection{display:none;} #adminSection.show{display:block;} #userSection.hide{display:none;}
  </style>
</head>
<body>
<div class="page">
  <div class="logo">
    <div class="logo-icon">🎌</div>
    <div class="logo-name">Dayy<span>nime</span></div>
    <div class="logo-sub">Nonton Anime Sub Indo</div>
  </div>
  <div class="card">
    <h2>Masuk</h2>
    <p>Masuk ke akun kamu untuk melanjutkan.</p>
    <div class="tabs">
      <button class="tab-btn active" id="tabUser" onclick="switchTab('user')"><i class="fas fa-user"></i> User</button>
      <button class="tab-btn" id="tabAdmin" onclick="switchTab('admin')"><i class="fas fa-shield-alt"></i> Admin</button>
    </div>
    <div class="error-box" id="errorBox"></div>
    <div id="userSection">
      <div class="field"><label>Email / Username</label><input type="text" id="emailInput" placeholder="email atau username kamu" autocomplete="username"></div>
      <div class="field"><label>Password</label><input type="password" id="passInput" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn-main" id="loginBtn" onclick="doLogin()">Masuk</button>
    </div>
    <div id="adminSection">
      <div class="field"><label>Token Admin</label><input type="password" id="tokenInput" placeholder="Masukkan token admin" autocomplete="off"></div>
      <button class="btn-main" id="adminBtn" onclick="doAdminLogin()">Masuk sebagai Admin</button>
    </div>
    <div class="footer-link" id="registerLink">Belum punya akun? <a href="/auth/register">Daftar sekarang</a></div>
  </div>
</div>
<script>
function switchTab(mode) {
  var isAdmin = (mode==='admin');
  document.getElementById('tabUser').classList.toggle('active',!isAdmin);
  document.getElementById('tabAdmin').classList.toggle('active',isAdmin);
  document.getElementById('userSection').classList.toggle('hide',isAdmin);
  document.getElementById('adminSection').classList.toggle('show',isAdmin);
  document.getElementById('registerLink').style.display = isAdmin?'none':'';
  clearError();
}
function showError(msg){var b=document.getElementById('errorBox');b.textContent=msg;b.classList.add('show');}
function clearError(){document.getElementById('errorBox').classList.remove('show');}
function setLoading(btnId,loading){
  var btn=document.getElementById(btnId);
  if(loading){btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Masuk...';}
  else{btn.disabled=false;btn.innerHTML=btn.id==='adminBtn'?'Masuk sebagai Admin':'Masuk';}
}
function doLogin(){
  clearError();
  var email=document.getElementById('emailInput').value.trim();
  var pass=document.getElementById('passInput').value;
  if(!email||!pass){showError('Isi email/username dan password dulu.');return;}
  setLoading('loginBtn',true);
  fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pass})})
  .then(function(r){return r.json();}).then(function(d){
    if(d.ok){window.location.href=d.redirect||'/home';}
    else{showError(d.error||'Login gagal.');setLoading('loginBtn',false);}
  }).catch(function(){showError('Koneksi bermasalah, coba lagi.');setLoading('loginBtn',false);});
}
function doAdminLogin(){
  clearError();
  var token=document.getElementById('tokenInput').value.trim();
  if(!token){showError('Masukkan token admin dulu.');return;}
  setLoading('adminBtn',true);
  fetch('/auth/login/admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token})})
  .then(function(r){return r.json();}).then(function(d){
    if(d.ok){window.location.href=d.redirect||'/admin';}
    else{showError(d.error||'Token tidak valid.');setLoading('adminBtn',false);}
  }).catch(function(){showError('Koneksi bermasalah.');setLoading('adminBtn',false);});
}
document.addEventListener('keydown',function(e){if(e.key!=='Enter')return;if(document.getElementById('adminSection').classList.contains('show'))doAdminLogin();else doLogin();});
</script>
</body>
</html>
