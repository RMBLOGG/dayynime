{% extends "base.html" %}
{% block title %}Login — Dayynime{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">dayyy<span class="exclaim">n</span>ime</div>
    <div class="auth-title">Selamat Datang</div>
    <div class="auth-sub">Masuk untuk melanjutkan nonton</div>

    <div id="authError" class="auth-error" style="display:none;"></div>

    <div class="auth-field">
      <label class="auth-label">Email / Username</label>
      <input type="text" id="inputEmail" class="auth-input" placeholder="email atau username" autocomplete="username">
    </div>
    <div class="auth-field">
      <label class="auth-label">Password</label>
      <input type="password" id="inputPassword" class="auth-input" placeholder="password kamu" autocomplete="current-password">
    </div>

    <button class="auth-btn" id="loginBtn" onclick="doLogin()">
      <span id="loginBtnText">Masuk</span>
    </button>

    <div class="auth-link">
      Belum punya akun? <a href="/auth/register">Daftar</a>
    </div>
    <div class="auth-link" style="margin-top:8px;">
      <a href="/home" style="color:var(--text3);font-weight:500;">← Lanjut tanpa login</a>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function doLogin() {
  var email = document.getElementById('inputEmail').value.trim();
  var password = document.getElementById('inputPassword').value;
  var btn = document.getElementById('loginBtn');
  var errEl = document.getElementById('authError');
  var btnText = document.getElementById('loginBtnText');

  if (!email || !password) {
    errEl.textContent = 'Email/username dan password wajib diisi.';
    errEl.style.display = 'block'; return;
  }

  btn.disabled = true;
  btnText.textContent = 'Memuat...';
  errEl.style.display = 'none';

  fetch('/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email: email, password: password})
  })
  .then(function(r){ return r.json(); })
  .then(function(d) {
    if (d.ok) {
      location.href = d.redirect || '/home';
    } else {
      errEl.textContent = d.error || 'Login gagal.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btnText.textContent = 'Masuk';
    }
  })
  .catch(function() {
    errEl.textContent = 'Gagal menghubungi server.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btnText.textContent = 'Masuk';
  });
}

// Enter key
document.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
</script>
{% endblock %}
