<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DayyNime</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/png" href="/static/icon.png">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0a0e0a;--bg2:#111611;--bg3:#172117;
      --accent:#00e676;--accent-dim:rgba(0,230,118,0.12);--accent-glow:rgba(0,230,118,0.3);
      --text:#eef2ee;--text2:#8a9e8a;--text3:#445544;
      --border:rgba(0,230,118,0.08);--border2:rgba(255,255,255,0.07);--radius:14px;
    }
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;}

    /* Glow blobs */
    .blob{position:fixed;border-radius:50%;filter:blur(100px);opacity:0.12;pointer-events:none;z-index:0;}
    .blob-1{width:400px;height:400px;background:radial-gradient(circle,#00e676,transparent 70%);top:-100px;left:-80px;}
    .blob-2{width:300px;height:300px;background:radial-gradient(circle,#00c853,transparent 70%);bottom:-80px;right:-60px;}

    .page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;}

    /* LOGO */
    .logo{margin-bottom:32px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;}
    .logo-icon{width:60px;height:60px;border-radius:18px;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px var(--accent-glow);}
    .logo-icon svg{width:34px;height:34px;}
    .logo-name{font-size:26px;font-weight:900;color:var(--text);letter-spacing:-0.5px;}
    .logo-name span{color:var(--accent);}
    .logo-sub{font-size:12px;color:var(--text3);margin-top:-4px;}

    .card{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;}
    .card h2{font-size:20px;font-weight:900;color:var(--text);margin-bottom:4px;}
    .card p{font-size:13px;color:var(--text2);margin-bottom:24px;}

    /* TABS */
    .tabs{display:flex;gap:0;margin-bottom:24px;border-radius:10px;overflow:hidden;background:var(--bg3);padding:4px;}
    .tab-btn{flex:1;padding:9px;font-size:13px;font-weight:800;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'Nunito',sans-serif;transition:all .2s;border-radius:8px;}
    .tab-btn.active{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-glow);}

    /* FIELD */
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:11px;font-weight:800;color:var(--text2);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px;}
    .field-wrap{position:relative;}
    .field input{
      width:100%;padding:12px 14px;background:var(--bg3);
      border:1.5px solid var(--border2);
      border-radius:10px;color:var(--text);font-size:14px;font-family:'Nunito',sans-serif;
      outline:none;transition:border-color .2s;
    }
    .field input:focus{border-color:var(--accent);}
    .field input::placeholder{color:var(--text3);}
    .field-icon{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none;}
    .field input:focus + .field-icon{color:var(--accent);}

    /* REMEMBER */
    .remember{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
    .remember label{font-size:12px;color:var(--text2);cursor:pointer;}
    .remember input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px;cursor:pointer;}

    /* BTN */
    .btn-main{
      width:100%;padding:14px;background:var(--accent);color:#000;border:none;
      border-radius:50px;font-size:15px;font-weight:900;cursor:pointer;
      font-family:'Nunito',sans-serif;letter-spacing:0.2px;transition:all .2s;
      margin-top:8px;box-shadow:0 4px 20px var(--accent-glow);
    }
    .btn-main:hover{opacity:0.88;}
    .btn-main:active{transform:scale(0.97);}
    .btn-main:disabled{opacity:0.45;cursor:not-allowed;box-shadow:none;}

    /* DIVIDER */
    .divider{display:flex;align-items:center;gap:10px;margin:20px 0;}
    .divider span{font-size:11px;color:var(--text3);white-space:nowrap;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2);}

    /* SOCIAL BTN */
    .social-btns{display:flex;gap:10px;}
    .social-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.2s;text-decoration:none;}
    .social-btn:hover{border-color:rgba(255,255,255,0.15);color:var(--text);}

    /* ERROR */
    .error-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:10px;padding:11px 14px;font-size:13px;color:#f87171;margin-bottom:14px;display:none;}
    .error-box.show{display:block;}

    /* FOOTER LINK */
    .footer-link{text-align:center;font-size:13px;color:var(--text3);margin-top:20px;}
    .footer-link a{color:var(--accent);font-weight:800;text-decoration:none;}

    /* SPINNER */
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.25);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    #adminSection{display:none;}
    #adminSection.show{display:block;}
  </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="page">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 2L3 8v13h6v-7h6v7h6V8L12 2z" fill="#000" opacity="0.9"/>
      </svg>
    </div>
    <span class="logo-name">Dayy<span>Nime</span></span>
    <span class="logo-sub">Nonton anime sub indo gratis</span>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="setTab('user',this)">Login</button>
      <button class="tab-btn" onclick="setTab('admin',this)">Admin</button>
    </div>

    <div id="errorBox" class="error-box"></div>

    <div id="userSection">
      <h2>Selamat datang!</h2>
      <p>Masuk untuk mulai nonton anime favoritmu</p>

      <div class="field">
        <label>Email</label>
        <div class="field-wrap">
          <input type="email" id="userEmail" placeholder="email@contoh.com" autocomplete="email">
          <i class="fas fa-envelope field-icon"></i>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="field-wrap">
          <input type="password" id="userPassword" placeholder="••••••••" autocomplete="current-password">
          <i class="fas fa-lock field-icon"></i>
        </div>
      </div>
      <div class="remember">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe">Ingat saya</label>
      </div>
      <button class="btn-main" onclick="doLogin()" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Masuk
      </button>

      <div class="divider"><span>atau masuk dengan</span></div>
      <div class="social-btns">
        <a href="/auth/google" class="social-btn"><i class="fab fa-google" style="color:#e8415a;"></i> Google</a>
        <a href="/auth/facebook" class="social-btn"><i class="fab fa-facebook" style="color:#60a5fa;"></i> Facebook</a>
      </div>
    </div>

    <div id="adminSection">
      <h2>Admin Login</h2>
      <p>Akses panel administrasi</p>
      <div class="field">
        <label>Admin Token</label>
        <div class="field-wrap">
          <input type="password" id="adminToken" placeholder="Masukkan admin token">
          <i class="fas fa-key field-icon"></i>
        </div>
      </div>
      <button class="btn-main" onclick="doAdminLogin()" id="adminBtn">
        <i class="fas fa-shield-alt"></i> Login Admin
      </button>
    </div>
  </div>

  <div class="footer-link">Belum punya akun? <a href="/register">Daftar sekarang</a></div>
</div>

<script>
function setTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if(tab === 'admin') {
    document.getElementById('userSection').style.display = 'none';
    document.getElementById('adminSection').classList.add('show');
    document.getElementById('adminSection').style.display = 'block';
  } else {
    document.getElementById('userSection').style.display = 'block';
    document.getElementById('adminSection').classList.remove('show');
    document.getElementById('adminSection').style.display = 'none';
  }
}

function showError(msg){
  var box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('show');
}

function doLogin(){
  var email = document.getElementById('userEmail').value.trim();
  var password = document.getElementById('userPassword').value;
  if(!email||!password){showError('Email dan password wajib diisi.');return;}
  var btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Memproses...';
  fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})})
    .then(r=>r.json()).then(d=>{
      if(d.success){window.location.href='/';}
      else{showError(d.message||'Email atau password salah.');btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt"></i> Masuk';}
    }).catch(()=>{
      // Fallback: submit form
      var f=document.createElement('form');f.method='POST';f.action='/login';
      [['email',email],['password',password]].forEach(function(p){var i=document.createElement('input');i.type='hidden';i.name=p[0];i.value=p[1];f.appendChild(i);});
      document.body.appendChild(f);f.submit();
    });
}

function doAdminLogin(){
  var token = document.getElementById('adminToken').value.trim();
  if(!token){showError('Token admin wajib diisi.');return;}
  var btn = document.getElementById('adminBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Memverifikasi...';
  fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({admin_token:token})})
    .then(r=>r.json()).then(d=>{
      if(d.success){window.location.href='/admin';}
      else{showError(d.message||'Token tidak valid.');btn.disabled=false;btn.innerHTML='<i class="fas fa-shield-alt"></i> Login Admin';}
    }).catch(()=>{
      var f=document.createElement('form');f.method='POST';f.action='/login';
      var i=document.createElement('input');i.type='hidden';i.name='admin_token';i.value=token;f.appendChild(i);
      document.body.appendChild(f);f.submit();
    });
}

document.addEventListener('keydown',function(e){if(e.key==='Enter'){doLogin();}});
</script>
</body>
</html>
