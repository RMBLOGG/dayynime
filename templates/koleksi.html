{% extends "base.html" %}
{% block title %}Koleksi Saya - Dayynime{% endblock %}
{% block content %}

<style>
.kol-page { padding: 20px 16px 100px; background: #0d0d0f; min-height: 100vh; }

/* Header */
.kol-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
.kol-header-left {}
.kol-heading { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
.kol-heading-icon { width: 32px; height: 32px; background: linear-gradient(135deg,#e8415a,#ff6b6b); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; flex-shrink: 0; }
.kol-title { font-size: 20px; font-weight: 900; color: #fff; }
.kol-subtitle { font-size: 12px; color: rgba(255,255,255,0.35); padding-left: 42px; }
.kol-clear-btn { display: none; align-items: center; gap: 6px; background: rgba(232,65,90,0.12); border: 1px solid rgba(232,65,90,0.25); color: #e8415a; font-size: 12px; font-weight: 700; padding: 8px 14px; border-radius: 50px; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; white-space: nowrap; transition: background 0.2s; flex-shrink: 0; margin-top: 4px; }
.kol-clear-btn:active { background: rgba(232,65,90,0.25); }

/* Filter tabs */
.kol-filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 20px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.kol-filters::-webkit-scrollbar { display: none; }
.kol-tab { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); color: rgba(255,255,255,0.5); padding: 7px 16px; border-radius: 50px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all 0.2s; font-family: inherit; -webkit-tap-highlight-color: transparent; }
.kol-tab.active { background: #e8415a; border-color: #e8415a; color: #fff; box-shadow: 0 3px 12px rgba(232,65,90,0.4); }

/* Grid */
.kol-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }

/* Card */
.kol-card { position: relative; border-radius: 12px; overflow: hidden; background: #16161a; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.15s; }
.kol-card:active { transform: scale(0.96); }
.kol-card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
.kol-card-gradient { position: absolute; bottom: 0; left: 0; right: 0; height: 65%; background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 55%, transparent 100%); pointer-events: none; }
.kol-card-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 8px 9px; }
.kol-card-title { font-size: 10.5px; font-weight: 800; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.35; margin-bottom: 3px; }
.kol-card-badge { display: inline-block; font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 20px; }
.kol-card-badge.ongoing { background: rgba(232,65,90,0.2); color: #e8415a; border: 1px solid rgba(232,65,90,0.3); }
.kol-card-badge.finished { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
.kol-card-badge.movie { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.25); }
.kol-card-badge.default { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }

/* Delete btn */
.kol-del-btn { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; color: #fff; font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; transition: background 0.15s; z-index: 2; }
.kol-del-btn:active { background: rgba(232,65,90,0.8); }

/* Empty state */
.kol-empty { display: none; text-align: center; padding: 70px 20px; }
.kol-empty-icon { width: 72px; height: 72px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 28px; color: rgba(255,255,255,0.15); margin-bottom: 18px; }
.kol-empty h3 { color: rgba(255,255,255,0.5); font-size: 15px; font-weight: 800; margin-bottom: 8px; }
.kol-empty p { color: rgba(255,255,255,0.25); font-size: 13px; margin-bottom: 22px; line-height: 1.6; }
.kol-empty-cta { display: inline-flex; align-items: center; gap: 8px; background: #e8415a; color: #fff; padding: 12px 26px; border-radius: 50px; font-size: 13px; font-weight: 800; text-decoration: none; box-shadow: 0 4px 18px rgba(232,65,90,0.4); }
</style>

<div class="kol-page">

  <!-- Header -->
  <div class="kol-header">
    <div class="kol-header-left">
      <div class="kol-heading">
        <div class="kol-heading-icon"><i class="fas fa-bookmark"></i></div>
        <span class="kol-title">Koleksi Saya</span>
      </div>
      <div class="kol-subtitle" id="koleksiCount">0 anime tersimpan</div>
    </div>
    <button class="kol-clear-btn" id="clearBtn" onclick="clearAllKoleksi()">
      <i class="fas fa-trash-alt"></i> Hapus Semua
    </button>
  </div>

  <!-- Filter -->
  <div class="kol-filters">
    <button class="kol-tab active" data-filter="all" onclick="filterKoleksi('all',this)">Semua</button>
    <button class="kol-tab" data-filter="Ongoing" onclick="filterKoleksi('Ongoing',this)">Ongoing</button>
    <button class="kol-tab" data-filter="Completed" onclick="filterKoleksi('Completed',this)">Completed</button>
    <button class="kol-tab" data-filter="Movie" onclick="filterKoleksi('Movie',this)">Movie</button>
  </div>

  <!-- Grid -->
  <div class="kol-grid" id="koleksiGrid"></div>

  <!-- Empty -->
  <div class="kol-empty" id="koleksiEmpty">
    <div class="kol-empty-icon"><i class="fas fa-bookmark"></i></div>
    <h3>Belum ada koleksi</h3>
    <p>Tambahkan anime ke koleksi dari<br>halaman detail anime</p>
    <a href="/home" class="kol-empty-cta"><i class="fas fa-compass"></i> Jelajahi Anime</a>
  </div>

</div>

<script>
const KOLEKSI_KEY = 'dayynime_koleksi';
let currentFilter = 'all';

function getKoleksi() {
  try { return JSON.parse(localStorage.getItem(KOLEKSI_KEY)) || []; }
  catch { return []; }
}
function saveKoleksi(data) { localStorage.setItem(KOLEKSI_KEY, JSON.stringify(data)); }

function badgeClass(status) {
  if (!status) return 'default';
  var s = status.toLowerCase();
  if (s.includes('ongoing') || s.includes('airing')) return 'ongoing';
  if (s.includes('finish') || s.includes('complete')) return 'finished';
  if (s.includes('movie')) return 'movie';
  return 'default';
}

function renderKoleksi() {
  var all = getKoleksi();
  var filtered = currentFilter === 'all' ? all : all.filter(function(a){ return a.status === currentFilter; });
  var grid = document.getElementById('koleksiGrid');
  var empty = document.getElementById('koleksiEmpty');
  var count = document.getElementById('koleksiCount');
  var clearBtn = document.getElementById('clearBtn');

  count.textContent = all.length + ' anime tersimpan';
  clearBtn.style.display = all.length > 0 ? 'flex' : 'none';

  if (filtered.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }

  grid.style.display = 'grid';
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(function(anime) {
    var bc = badgeClass(anime.status);
    var statusLabel = anime.status || '';
    return '<div class="kol-card" onclick="goDetail(\'' + anime.slug + '\')">' +
      '<img class="kol-card-img" src="' + anime.poster + '" alt="' + anime.title + '" onerror="this.src=\'/static/no-image.svg\'">' +
      '<div class="kol-card-gradient"></div>' +
      '<button class="kol-del-btn" onclick="event.stopPropagation();removeKoleksi(\'' + anime.slug + '\')"><i class="fas fa-times"></i></button>' +
      '<div class="kol-card-info">' +
        '<div class="kol-card-title">' + anime.title + '</div>' +
        (statusLabel ? '<span class="kol-card-badge ' + bc + '">' + statusLabel + '</span>' : '') +
      '</div>' +
    '</div>';
  }).join('');
}

function removeKoleksi(slug) {
  saveKoleksi(getKoleksi().filter(function(a){ return a.slug !== slug; }));
  renderKoleksi();
}

function clearAllKoleksi() {
  if (!confirm('Hapus semua koleksi?')) return;
  saveKoleksi([]);
  renderKoleksi();
}

function filterKoleksi(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.kol-tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  renderKoleksi();
}

function goDetail(slug) { location.href = '/anime/' + slug; }

document.addEventListener('DOMContentLoaded', renderKoleksi);
</script>

{% endblock %}
