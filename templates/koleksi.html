{% extends "base.html" %}
{% block title %}Koleksi Saya - Dayynime{% endblock %}
{% block content %}
<div class="section-wrap" style="padding-top:16px;">
  <div class="section-head">
    <div class="section-title">Koleksi Saya</div>
    <span id="colCount" style="font-size:11px;color:var(--text3);font-weight:700;"></span>
  </div>
  <div class="anime-grid" id="koleksiGrid">
    <div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--text3);">
      <div style="font-size:24px;margin-bottom:8px;">📚</div>
      <div>Memuat koleksi...</div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
  fetch('/api/bookmark/list').then(function(r){return r.json();}).then(function(d){
    var grid=document.getElementById('koleksiGrid');
    var ct=document.getElementById('colCount');
    if(!d.bookmarks||!d.bookmarks.length){
      grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text3);"><div style="font-size:40px;margin-bottom:12px;">🔖</div><div style="font-size:14px;font-weight:700;margin-bottom:8px;">Belum ada koleksi</div><div style="font-size:12px;margin-bottom:20px;">Tambah anime dari halaman detail anime</div><a href="/home" style="display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--pink),#c44b7a);color:#fff;border-radius:50px;padding:10px 24px;font-size:13px;font-weight:900;text-decoration:none;box-shadow:0 4px 14px var(--pink-glow);">Jelajahi Anime</a></div>';
      return;
    }
    if(ct) ct.textContent=d.bookmarks.length+' anime';
    grid.innerHTML=d.bookmarks.map(function(b){
      return '<a href="/anime/'+b.slug+'" class="acard">' +
        '<div class="acard-poster"><img src="'+b.poster+'" alt="'+b.title+'" loading="lazy" onerror="this.src=\'/static/no-image.svg\'">' +
        '<div class="acard-type">'+(b.type||'Anime')+'</div>' +
        '</div>' +
        '<div class="acard-genre">'+(b.type||'Anime')+'</div>' +
        '<div class="acard-title">'+b.title+'</div>' +
        '</a>';
    }).join('');
  }).catch(function(){
    var grid=document.getElementById('koleksiGrid');
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3);">Gagal memuat koleksi</div>';
  });
})();
</script>
{% endblock %}
