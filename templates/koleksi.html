{% extends "base.html" %}
{% block title %}Koleksi Saya - Dayynime{% endblock %}
{% block content %}

<div style="padding:70px 16px 100px;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div>
      <h2 style="font-size:18px;font-weight:800;color:#fff;margin:0;">
        <i class="fas fa-bookmark" style="color:#ff6600;margin-right:8px;"></i>Koleksi Saya
      </h2>
      <div style="font-size:12px;color:#666;margin-top:2px;" id="koleksiCount">0 anime tersimpan</div>
    </div>
    <button onclick="clearAllKoleksi()" id="clearBtn" style="display:none;background:rgba(255,50,50,0.15);border:1px solid rgba(255,50,50,0.3);color:#ff5555;font-size:11px;padding:6px 12px;border-radius:20px;cursor:pointer;">
      <i class="fas fa-trash" style="margin-right:4px;"></i>Hapus Semua
    </button>
  </div>

  <!-- Filter Tabs -->
  <div style="display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;">
    <button class="kol-tab active" data-filter="all" onclick="filterKoleksi('all',this)">Semua</button>
    <button class="kol-tab" data-filter="Ongoing" onclick="filterKoleksi('Ongoing',this)">Ongoing</button>
    <button class="kol-tab" data-filter="Completed" onclick="filterKoleksi('Completed',this)">Completed</button>
    <button class="kol-tab" data-filter="Movie" onclick="filterKoleksi('Movie',this)">Movie</button>
  </div>

  <!-- Grid -->
  <div id="koleksiGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;"></div>

  <!-- Empty State -->
  <div id="koleksiEmpty" style="display:none;text-align:center;padding:60px 20px;">
    <i class="fas fa-bookmark" style="font-size:3rem;color:#333;margin-bottom:16px;display:block;"></i>
    <h3 style="color:#666;font-size:15px;font-weight:600;margin-bottom:8px;">Belum ada koleksi</h3>
    <p style="color:#444;font-size:13px;margin-bottom:20px;">Tambahkan anime ke koleksi dari halaman detail anime</p>
    <a href="/home" style="display:inline-block;background:#ff6600;color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:600;text-decoration:none;">Jelajahi Anime</a>
  </div>

</div>

<style>
.kol-tab {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #888;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.kol-tab.active {
  background: #ff6600;
  border-color: #ff6600;
  color: #fff;
}
.kol-card {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  background: #1a1a1a;
  cursor: pointer;
  transition: transform 0.2s;
}
.kol-card:active { transform: scale(0.97); }
.kol-card img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
}
.kol-card-info {
  padding: 6px 7px 8px;
}
.kol-card-title {
  font-size: 11px;
  font-weight: 600;
  color: #ddd;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.4;
}
.kol-card-status {
  font-size: 10px;
  color: #ff6600;
  font-weight: 600;
  margin-top: 3px;
}
.kol-del-btn {
  position: absolute;
  top: 5px;
  right: 5px;
  width: 24px;
  height: 24px;
  background: rgba(0,0,0,0.75);
  border: none;
  border-radius: 50%;
  color: #ff5555;
  font-size: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
</style>

<script>
const KOLEKSI_KEY = 'dayynime_koleksi';
let currentFilter = 'all';

function getKoleksi() {
  try { return JSON.parse(localStorage.getItem(KOLEKSI_KEY)) || []; }
  catch { return []; }
}

function saveKoleksi(data) {
  localStorage.setItem(KOLEKSI_KEY, JSON.stringify(data));
}

function renderKoleksi() {
  const all = getKoleksi();
  const filtered = currentFilter === 'all' ? all : all.filter(a => a.status === currentFilter);
  const grid = document.getElementById('koleksiGrid');
  const empty = document.getElementById('koleksiEmpty');
  const count = document.getElementById('koleksiCount');
  const clearBtn = document.getElementById('clearBtn');

  count.textContent = all.length + ' anime tersimpan';
  clearBtn.style.display = all.length > 0 ? 'block' : 'none';

  if (filtered.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }

  grid.style.display = 'grid';
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(anime => `
    <div class="kol-card" onclick="goDetail('${anime.slug}')">
      <img src="${anime.poster}" alt="${anime.title}" onerror="this.src='/static/no-image.svg'">
      <button class="kol-del-btn" onclick="event.stopPropagation();removeKoleksi('${anime.slug}')">
        <i class="fas fa-times"></i>
      </button>
      <div class="kol-card-info">
        <div class="kol-card-title">${anime.title}</div>
        <div class="kol-card-status">${anime.status || ''}</div>
      </div>
    </div>
  `).join('');
}

function removeKoleksi(slug) {
  const data = getKoleksi().filter(a => a.slug !== slug);
  saveKoleksi(data);
  renderKoleksi();
}

function clearAllKoleksi() {
  if (!confirm('Hapus semua koleksi?')) return;
  saveKoleksi([]);
  renderKoleksi();
}

function filterKoleksi(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.kol-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderKoleksi();
}

function goDetail(slug) {
  location.href = '/anime/' + slug;
}

document.addEventListener('DOMContentLoaded', renderKoleksi);
</script>

{% endblock %}
