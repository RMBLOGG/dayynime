{% extends "base.html" %}
{% block title %}Ruang Ngobrol - Dayynime{% endblock %}
{% block head %}
<style>
.chat-wrap { display:flex; flex-direction:column; height:calc(100vh - var(--nav-h) - var(--bottom-h)); position:relative; }
.chat-messages { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
.chat-messages::-webkit-scrollbar { width:2px; }
.chat-messages::-webkit-scrollbar-thumb { background:var(--pink); }
.msg-row { display:flex; gap:8px; animation:fadeInUp 0.2s ease; }
.msg-row.mine { flex-direction:row-reverse; }
.msg-avatar { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,var(--pink),#c44b7a); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; color:#fff; flex-shrink:0; }
.msg-bubble { max-width:72%; padding:8px 12px; border-radius:14px; font-size:13px; line-height:1.5; word-break:break-word; }
.msg-row:not(.mine) .msg-bubble { background:var(--bg2); border:1.5px solid var(--border2); border-radius:4px 14px 14px 14px; color:var(--text); }
.msg-row.mine .msg-bubble { background:linear-gradient(135deg,var(--pink),#c44b7a); color:#fff; border-radius:14px 4px 14px 14px; }
.msg-name { font-size:9px; font-weight:800; color:var(--pink); margin-bottom:2px; text-transform:uppercase; letter-spacing:0.3px; }
.msg-time { font-size:9px; color:var(--text3); margin-top:3px; }
.chat-input-bar { padding:10px 16px; border-top:1px solid var(--border); display:flex; gap:8px; align-items:center; background:rgba(13,13,20,0.9); backdrop-filter:blur(12px); }
.chat-input { flex:1; background:var(--bg3); border:1.5px solid var(--border2); border-radius:50px; padding:10px 16px; color:var(--text); font-size:13px; font-family:'Nunito',sans-serif; font-weight:600; outline:none; transition:border-color 0.2s; }
.chat-input:focus { border-color:var(--pink); }
.chat-send-btn { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,var(--pink),#c44b7a); border:none; color:#fff; display:flex; align-items:center; justify-content:center; font-size:15px; cursor:pointer; flex-shrink:0; box-shadow:0 4px 14px var(--pink-glow); transition:transform 0.2s; }
.chat-send-btn:hover { transform:scale(1.05); }
</style>
{% endblock %}
{% block content %}
<div style="padding:12px 16px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">
  <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:18px;">💬</div>
  <div>
    <div style="font-family:'M PLUS Rounded 1c',sans-serif;font-size:15px;font-weight:900;color:var(--text);">Ruang Ngobrol</div>
    <div style="font-size:10px;color:var(--cyan);font-weight:700;display:flex;align-items:center;gap:4px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--cyan);display:inline-block;animation:viewerPulse 1.5s ease-in-out infinite;"></span> <span id="onlineCount">0</span> online</div>
  </div>
</div>
<div class="chat-wrap">
  <div class="chat-messages" id="chatMessages">
    <div style="text-align:center;padding:20px;color:var(--text3);font-size:12px;">Memuat pesan...</div>
  </div>
  <div class="chat-input-bar">
    <input class="chat-input" id="chatInput" type="text" placeholder="Tulis pesan..." maxlength="300" autocomplete="off">
    <button class="chat-send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var myUser = null;
var SUPABASE_URL = 'https://mafnnqttvkdgqqxczqyt.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1hZm5ucXR0dmtkZ3FxeGN6cXl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NzQyMDEsImV4cCI6MjA4NzQ1MDIwMX0.YRh1oWVKnn4tyQNRbcPhlSyvr7V_1LseWN7VjcImb-Y';
var client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function timeAgo(iso){var d=(Date.now()-new Date(iso).getTime())/1000;if(d<60)return'Baru saja';if(d<3600)return Math.floor(d/60)+' mnt';return Math.floor(d/3600)+' jam';}

function renderMsg(m, isMe) {
  var row=document.createElement('div');
  row.className='msg-row'+(isMe?' mine':'');
  row.innerHTML='<div class="msg-avatar">'+(m.username||'A')[0].toUpperCase()+'</div>' +
    '<div><div class="msg-bubble">'+(isMe?'':('<div class="msg-name">'+(m.username||'Anon')+'</div>'))+m.text+'<div class="msg-time">'+timeAgo(m.created_at)+'</div></div></div>';
  return row;
}

function loadMsgs(){
  fetch('/api/globalchat?limit=50').then(function(r){return r.json();}).then(function(d){
    if(!d.messages) return;
    var list=document.getElementById('chatMessages');
    list.innerHTML='';
    d.messages.reverse().forEach(function(m){
      list.appendChild(renderMsg(m, myUser&&m.user_id===myUser.id));
    });
    list.scrollTop=list.scrollHeight;
  }).catch(function(){});
}

function sendMsg(){
  var inp=document.getElementById('chatInput');
  var text=inp.value.trim();
  if(!text) return;
  inp.value='';
  fetch('/api/globalchat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text})}).then(function(){loadMsgs();}).catch(function(){});
}

document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});

fetch('/api/me').then(function(r){return r.json();}).then(function(d){myUser=d.user;loadMsgs();}).catch(loadMsgs);
setInterval(loadMsgs, 5000);
localStorage.setItem('dayy_chat_seen', new Date().toISOString());
</script>
{% endblock %}
