<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - Dayynime</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/png" href="/static/icon.png">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{--bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2e;--pink:#fb7299;--pink-dim:rgba(251,114,153,0.15);--pink-glow:rgba(251,114,153,0.3);--text:#f0f0f8;--text2:#b0b0cc;--text3:#6060a0;--border:rgba(251,114,153,0.12);--border2:rgba(255,255,255,0.07);--radius:14px;}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 20% 30%,rgba(251,114,153,0.08) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 70%,rgba(0,161,214,0.06) 0%,transparent 60%);}
    .page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}
    .logo{margin-bottom:24px;text-align:center;}
    .logo-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#fb7299,#c44b7a);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px;box-shadow:0 8px 28px var(--pink-glow);}
    .logo-name{font-family:'M PLUS Rounded 1c',sans-serif;font-size:22px;font-weight:900;color:#fff;}
    .logo-name span{color:var(--pink);}
    .logo-sub{font-size:11px;color:var(--text3);margin-top:2px;}
    .card{width:100%;max-width:360px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:28px 22px;}
    .card h2{font-family:'M PLUS Rounded 1c',sans-serif;font-size:20px;font-weight:900;color:var(--text);margin-bottom:4px;}
    .card p{font-size:12px;color:var(--text2);margin-bottom:22px;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:11px;font-weight:800;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
    .field input{width:100%;padding:12px 16px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:50px;color:var(--text);font-size:14px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border-color .2s,box-shadow .2s;}
    .field input:focus{border-color:var(--pink);box-shadow:0 0 0 3px var(--pink-dim);}
    .field .hint{font-size:10px;color:var(--text3);margin-top:5px;padding-left:4px;}
    .strength{height:3px;border-radius:2px;margin-top:6px;transition:width .3s,background .3s;width:0;}
    .btn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--pink),#c44b7a);color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;letter-spacing:0.3px;transition:transform .2s,box-shadow .2s;margin-top:6px;box-shadow:0 4px 18px var(--pink-glow);}
    .btn-main:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--pink-glow);}
    .btn-main:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
    .error-box{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:10px 14px;font-size:12px;color:#f87171;margin-bottom:14px;display:none;}
    .error-box.show{display:block;}
    .success-box{background:rgba(0,212,170,0.12);border:1px solid rgba(0,212,170,0.3);border-radius:10px;padding:10px 14px;font-size:12px;color:#00d4aa;margin-bottom:14px;display:none;}
    .success-box.show{display:block;}
    .footer-link{text-align:center;font-size:12px;color:var(--text3);margin-top:20px;}
    .footer-link a{color:var(--pink);font-weight:800;text-decoration:none;}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div class="page">
  <div class="logo">
    <div class="logo-icon">🎌</div>
    <div class="logo-name">Dayy<span>nime</span></div>
    <div class="logo-sub">Nonton Anime Sub Indo</div>
  </div>
  <div class="card">
    <h2>Buat Akun</h2>
    <p>Daftar gratis dan mulai nonton anime favoritmu!</p>
    <div class="error-box" id="errorBox"></div>
    <div class="success-box" id="successBox"></div>
    <div class="field">
      <label>Nama Lengkap</label>
      <input type="text" id="nameInput" placeholder="Nama kamu" autocomplete="name">
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="usernameInput" placeholder="username unik kamu" autocomplete="username">
      <div class="hint">Hanya huruf, angka, dan underscore</div>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="email@kamu.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passInput" placeholder="Min. 8 karakter" autocomplete="new-password" oninput="checkStrength(this.value)">
      <div class="strength" id="strengthBar"></div>
      <div class="hint" id="strengthLabel"></div>
    </div>
    <button class="btn-main" id="registerBtn" onclick="doRegister()">Buat Akun</button>
    <div class="footer-link">Sudah punya akun? <a href="/auth/login">Masuk</a></div>
  </div>
</div>
<script>
function checkStrength(val) {
  var bar = document.getElementById('strengthBar');
  var lbl = document.getElementById('strengthLabel');
  if(!val){bar.style.width='0';lbl.textContent='';return;}
  var score=0;
  if(val.length>=8)score++;
  if(/[A-Z]/.test(val))score++;
  if(/[0-9]/.test(val))score++;
  if(/[^A-Za-z0-9]/.test(val))score++;
  var colors=['#ef4444','#f97316','#eab308','#22c55e'];
  var labels=['Lemah','Lumayan','Kuat','Sangat Kuat'];
  bar.style.width=(score*25)+'%';
  bar.style.background=colors[score-1]||'transparent';
  lbl.textContent=labels[score-1]||'';
  lbl.style.color=colors[score-1]||'';
}
function showError(msg){var b=document.getElementById('errorBox');b.textContent=msg;b.classList.add('show');}
function clearMsg(){document.getElementById('errorBox').classList.remove('show');document.getElementById('successBox').classList.remove('show');}
function doRegister(){
  clearMsg();
  var name=document.getElementById('nameInput').value.trim();
  var username=document.getElementById('usernameInput').value.trim();
  var email=document.getElementById('emailInput').value.trim();
  var pass=document.getElementById('passInput').value;
  if(!name||!username||!email||!pass){showError('Isi semua field dulu.');return;}
  if(pass.length<8){showError('Password minimal 8 karakter.');return;}
  var btn=document.getElementById('registerBtn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Mendaftar...';
  fetch('/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,username:username,email:email,password:pass})})
  .then(function(r){return r.json();}).then(function(d){
    if(d.ok){var sb=document.getElementById('successBox');sb.textContent=d.message||'Akun berhasil dibuat!';sb.classList.add('show');setTimeout(function(){window.location.href=d.redirect||'/auth/login';},1500);}
    else{showError(d.error||'Pendaftaran gagal.');btn.disabled=false;btn.innerHTML='Buat Akun';}
  }).catch(function(){showError('Koneksi bermasalah.');btn.disabled=false;btn.innerHTML='Buat Akun';});
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')doRegister();});
</script>
</body>
</html>
