{% extends "base.html" %}
{% block title %}Daftar — Dayynime{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">dayyy<span class="exclaim">n</span>ime</div>
    <div class="auth-title">Buat Akun</div>
    <div class="auth-sub">Daftar gratis dan mulai nonton!</div>

    <div id="authError" class="auth-error" style="display:none;"></div>

    <div class="auth-field">
      <label class="auth-label">Username</label>
      <input type="text" id="inputUsername" class="auth-input" placeholder="username unik kamu" autocomplete="username">
    </div>
    <div class="auth-field">
      <label class="auth-label">Email</label>
      <input type="email" id="inputEmail" class="auth-input" placeholder="email@contoh.com" autocomplete="email">
    </div>
    <div class="auth-field">
      <label class="auth-label">Password</label>
      <input type="password" id="inputPassword" class="auth-input" placeholder="minimal 6 karakter" autocomplete="new-password">
    </div>

    <button class="auth-btn" id="regBtn" onclick="doRegister()">
      <span id="regBtnText">Daftar Sekarang</span>
    </button>

    <div class="auth-link">
      Sudah punya akun? <a href="/auth/login">Masuk</a>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function doRegister() {
  var username = document.getElementById('inputUsername').value.trim();
  var email = document.getElementById('inputEmail').value.trim();
  var password = document.getElementById('inputPassword').value;
  var btn = document.getElementById('regBtn');
  var errEl = document.getElementById('authError');
  var btnText = document.getElementById('regBtnText');

  if (!username || !email || !password) {
    errEl.textContent = 'Semua field wajib diisi.'; errEl.style.display = 'block'; return;
  }
  btn.disabled = true; btnText.textContent = 'Memuat...'; errEl.style.display = 'none';

  fetch('/auth/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username: username, email: email, password: password})
  })
  .then(function(r){ return r.json(); })
  .then(function(d) {
    if (d.ok) { location.href = d.redirect || '/home'; }
    else {
      errEl.textContent = d.error || 'Gagal daftar.'; errEl.style.display = 'block';
      btn.disabled = false; btnText.textContent = 'Daftar Sekarang';
    }
  })
  .catch(function() {
    errEl.textContent = 'Gagal menghubungi server.'; errEl.style.display = 'block';
    btn.disabled = false; btnText.textContent = 'Daftar Sekarang';
  });
}
document.addEventListener('keydown', function(e){ if(e.key==='Enter') doRegister(); });
</script>
{% endblock %}
