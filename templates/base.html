<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="google-site-verification" content="pTKv7RdKpXBtLCnGaf4YM9U_aXpx4uzHnyL2mm3Kn3s" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>{% block title %}Dayynime{% endblock %}</title>
  <meta name="description" content="{% block description %}Nonton anime subtitle Indonesia gratis di Dayynime.{% endblock %}">
  <meta property="og:type" content="{% block og_type %}website{% endblock %}">
  <meta property="og:site_name" content="DayyNime">
  <meta property="og:title" content="{% block og_title %}Dayynime - Nonton Anime Sub Indo Gratis{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Nonton anime subtitle Indonesia gratis di Dayynime.{% endblock %}">
  <meta property="og:image" content="{% block og_image %}https://dayynime.vercel.app/static/banner.png{% endblock %}">
  <meta property="og:url" content="{{ request.url }}">
  <link rel="canonical" href="{{ request.url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/png" href="/static/icon.png">
  <link rel="apple-touch-icon" href="/static/icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d0d0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DayyNime">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=20">
  <style>
  :root {
    --bg:           #0d0d0f;
    --bg2:          #161618;
    --bg3:          #1e1e21;
    --bg4:          #262629;
    --card:         #161618;
    --border:       rgba(255,255,255,0.07);
    --accent:       #e8415a;
    --accent2:      #f0607a;
    --accent-dim:   rgba(232,65,90,0.15);
    --accent-glow:  rgba(232,65,90,0.35);
    --green:        #22c55e;
    --blue:         #60a5fa;
    --gold:         #f5c518;
    --text:         #f0f0f0;
    --text2:        #a0a0aa;
    --text3:        #55556a;
    --radius:       8px;
    --radius-sm:    8px;
    --radius-xs:    6px;
    --nav-h:        0px;
    --bottom-h:     68px;
    --page-pad:     14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html { scroll-behavior:smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding-bottom: calc(var(--bottom-h) + 12px);
    padding-top: 0;
    overflow-x: hidden;
  }
  a { color:inherit; text-decoration:none; }
  img { display:block; max-width:100%; }
  button { font-family:inherit; cursor:pointer; }
  ::-webkit-scrollbar { width:2px; height:2px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--accent); border-radius:2px; }

  /* APP HEADER */
  .app-header {
    padding: 14px var(--page-pad) 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
  }
  .header-user-card {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 10px 14px;
    border: 1px solid var(--border);
    text-decoration: none;
    color: inherit;
    min-width: 0;
    transition: background 0.2s;
  }
  .header-user-card:active { background: var(--bg3); }
  .header-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden; position: relative;
  }
  .header-avatar img { width:100%; height:100%; object-fit:cover; }
  .header-avatar i { color: var(--text3); font-size: 16px; }
  .header-user-greeting { font-size:11px; color:var(--text3); font-weight:600; line-height:1; margin-bottom:2px; }
  .header-user-name { font-size:14px; font-weight:800; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .header-action-btn {
    width: 46px; height: 46px;
    border-radius: var(--radius);
    background: #e8415a;
    border: none; color: #fff; font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    text-decoration: none;
  }
  .header-action-btn:active { transform: scale(0.93); }
  .header-action-btn.secondary {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
  }

  /* DISCOVER BANNER */
  .discover-banner {
    margin: 0 var(--page-pad) 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
    text-decoration: none; color: inherit;
    transition: background 0.2s;
  }
  .discover-banner:active { background: var(--bg3); }
  .discover-icon {
    width: 46px; height: 46px;
    border-radius: var(--radius-sm);
    background: rgba(232,65,90,0.15);
    border: 1.5px solid rgba(232,65,90,0.3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .discover-title { font-size:14px; font-weight:800; color:var(--text); }
  .discover-sub { font-size:11px; color:var(--text3); margin-top:1px; }
  .discover-count-badge {
    background: rgba(232,65,90,0.15);
    border: 1px solid rgba(232,65,90,0.3);
    color: #e8415a;
    font-size: 10px; font-weight: 900;
    padding: 4px 10px; border-radius: 20px; white-space: nowrap;
    display: flex; align-items: center; gap: 4px;
  }

  /* SECTION PILL LABEL */
  .section-pill-label {
    display: inline-flex; align-items: center; gap: 6px;
    background: #e8415a; color: #fff;
    font-size: 12px; font-weight: 900;
    padding: 6px 14px 6px 10px;
    border-radius: 20px;
    margin: 0 var(--page-pad) 10px;
    letter-spacing: 0.2px;
  }

  /* HERO BANNER */
  .banner-slider { position:relative; overflow:hidden; margin:0 var(--page-pad) 0; }
  .banner-track { display:flex; gap:10px; transition:transform 0.5s cubic-bezier(0.4,0,0.2,1); }
  .banner-slide {
    min-width:calc(100% - 30px); flex-shrink:0; aspect-ratio:16/9;
    background:var(--bg2);
    display:flex; align-items:flex-end;
    position:relative; overflow:hidden;
    text-decoration:none; color:#fff;
    border-radius:16px;
  }
  .banner-slide .slide-bg {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover; object-position:center top;
  }
  .banner-slide::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(to bottom, transparent 0%, rgba(13,13,15,0.4) 50%, rgba(13,13,15,0.97) 100%);
  }
  .banner-rating {
    position:absolute; top:12px; right:12px; z-index:3;
    background:#e8415a; color:#fff;
    font-size:12px; font-weight:900;
    padding:5px 11px; border-radius:20px;
    display:flex; align-items:center; gap:5px;
    box-shadow: 0 4px 16px rgba(232,65,90,0.45);
  }
  .banner-rating i { font-size:10px; color:#f5c518; }
  .banner-content { position:relative; z-index:2; padding:0 14px 14px; width:100%; }
  .banner-title {
    font-size:1.1rem; font-weight:900; line-height:1.2;
    margin-bottom:8px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
  }
  .banner-pills { display:flex; gap:6px; flex-wrap:wrap; }
  .banner-pill {
    display:inline-flex; align-items:center; gap:5px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px; padding:5px 10px;
    font-size:11px; font-weight:700;
    color:rgba(255,255,255,0.9);
  }
  .banner-pill i { font-size:10px; opacity:0.8; }
  .banner-dots-wrap { display:flex; gap:5px; justify-content:center; padding:10px 0 4px; }
  .banner-dot {
    width:6px; height:6px; border-radius:50%;
    background:rgba(255,255,255,0.2);
    transition:all 0.3s; border:none; cursor:pointer; padding:0;
  }
  .banner-dot.active { width:22px; border-radius:4px; background:#e8415a; }
  .banner-arrow {
    position:absolute; top:50%; transform:translateY(-50%);
    background:rgba(0,0,0,0.55); border:none; color:#fff;
    width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; z-index:3; cursor:pointer;
  }
  .banner-arrow.left { left:8px; }
  .banner-arrow.right { right:8px; }

  /* SECTIONS */
  .section { padding:20px 0 0; }
  .section-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:0 var(--page-pad); margin-bottom:12px;
  }
  .section-title { font-size:16px; font-weight:900; color:var(--text); letter-spacing:-0.2px; }
  .section-more {
    font-size:11px; color:var(--text3); font-weight:700;
    display:flex; align-items:center; gap:3px;
  }
  .idx-section-badge {
    display:inline-flex; align-items:center;
    background:var(--accent-dim); color:var(--accent);
    font-size:9px; font-weight:900;
    padding:2px 7px; border-radius:4px;
    letter-spacing:0.5px; text-transform:uppercase;
    margin-left:6px;
  }

  /* SCROLL ROW */
  .scroll-row {
    display:flex; gap:10px; overflow-x:auto;
    padding:2px var(--page-pad) 6px;
    scrollbar-width:none; -ms-overflow-style:none;
    scroll-snap-type:x mandatory;
  }
  .scroll-row::-webkit-scrollbar { display:none; }

  /* ANIME CARD */
  .acard { flex-shrink:0; width:130px; text-decoration:none; color:inherit; scroll-snap-align:start; }
  .acard-poster {
    position:relative; width:100%; aspect-ratio:2/3;
    border-radius:var(--radius); overflow:hidden;
    background:var(--bg2); margin-bottom:7px;
  }
  .acard-poster img { width:100%; height:100%; object-fit:cover; transition:transform 0.3s; }
  .acard:active .acard-poster img { transform:scale(1.04); }
  .acard-rating {
    position:absolute; top:7px; right:7px;
    background:#e8415a; color:#fff;
    font-size:10px; font-weight:900;
    padding:3px 8px; border-radius:20px;
    display:flex; align-items:center; gap:4px;
    box-shadow:0 2px 8px rgba(232,65,90,0.5); z-index:2;
  }
  .acard-rating i { font-size:8px; color:#f5c518; }
  .acard-ep {
    position:absolute; bottom:7px; left:7px;
    background:rgba(0,0,0,0.75); color:#fff;
    font-size:9px; font-weight:700;
    padding:2px 7px; border-radius:10px;
    display:flex; align-items:center; gap:3px;
  }
  .acard-type {
    position:absolute; top:7px; left:7px;
    background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.1);
    color:var(--text2); font-size:8px; font-weight:700;
    padding:2px 6px; border-radius:6px;
    text-transform:uppercase; letter-spacing:0.3px;
  }
  .acard-title {
    font-size:12px; font-weight:700; color:var(--text);
    line-height:1.3;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden; margin-bottom:2px;
  }
  .acard-genre { font-size:10px; color:var(--text3); font-weight:600; }
  .acard-viewers { display:none; }

  /* WIDE CARD GRID */
  .idx-wcard-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:10px; padding:0 var(--page-pad);
  }
  .idx-wcard {
    display:flex; flex-direction:column;
    text-decoration:none; color:inherit;
    background:var(--card);
    border-radius:var(--radius); overflow:hidden;
    border:1px solid var(--border); transition:transform 0.2s;
  }
  .idx-wcard:active { transform:scale(0.97); }
  .idx-wcard-thumb { position:relative; aspect-ratio:16/9; overflow:hidden; background:var(--bg2); }
  .idx-wcard-thumb img { width:100%; height:100%; object-fit:cover; }
  .idx-wcard-ep {
    position:absolute; bottom:5px; right:5px;
    background:var(--accent); color:#fff;
    font-size:9px; font-weight:800; padding:2px 6px; border-radius:6px;
  }
  .idx-wcard-info { padding:8px 9px 9px; }
  .idx-wcard-title {
    font-size:12px; font-weight:800; color:var(--text);
    display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical;
    overflow:hidden; margin-bottom:3px;
  }
  .idx-wcard-sub { font-size:10px; color:var(--text3); font-weight:600; }
  .idx-wcard-time { font-size:10px; color:var(--text3); font-weight:600; display:flex; align-items:center; gap:3px; margin-top:3px; }

  /* RANK LIST */
  .idx-rank-item {
    display:flex; align-items:center; gap:12px;
    padding:10px var(--page-pad); text-decoration:none; color:inherit;
    transition:background 0.15s; border-radius:var(--radius-sm);
    margin:0 8px 2px;
  }
  .idx-rank-item:active { background:var(--bg2); }
  .idx-rank-num { font-size:18px; font-weight:900; width:28px; text-align:center; flex-shrink:0; font-style:italic; }
  .idx-rank-num.top1 { color:var(--gold); }
  .idx-rank-num.top2 { color:#c0c0c0; }
  .idx-rank-num.top3 { color:#cd7f32; }
  .idx-rank-num.other { color:var(--text3); }
  .idx-rank-thumb { width:52px; height:70px; border-radius:var(--radius-sm); overflow:hidden; flex-shrink:0; background:var(--bg2); }
  .idx-rank-thumb img { width:100%; height:100%; object-fit:cover; }
  .idx-rank-info { flex:1; min-width:0; }
  .idx-rank-title {
    font-size:13px; font-weight:800;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden; margin-bottom:6px;
  }
  .idx-rank-score { display:flex; align-items:center; gap:8px; }
  .idx-rank-score-bar { flex:1; height:3px; background:var(--bg4); border-radius:2px; overflow:hidden; }
  .idx-rank-score-fill { height:100%; background:linear-gradient(90deg,var(--accent),#ff6b9d); border-radius:2px; transition:width 1s cubic-bezier(0.4,0,0.2,1); }
  .idx-rank-score-num { font-size:11px; font-weight:800; color:var(--gold); }

  /* GENRE CHIPS */
  .idx-genre-scroll { display:flex; gap:8px; overflow-x:auto; padding:0 var(--page-pad) 4px; scrollbar-width:none; }
  .idx-genre-scroll::-webkit-scrollbar { display:none; }
  .idx-genre-chip {
    display:inline-flex; align-items:center; gap:6px;
    background:var(--bg2); border:1px solid var(--border);
    border-radius:20px; padding:7px 14px;
    font-size:12px; font-weight:700; color:var(--text2);
    text-decoration:none; white-space:nowrap; flex-shrink:0;
    transition:all 0.2s;
    opacity:0; transform:scale(0.9);
  }
  .idx-genre-chip:active { background:var(--accent-dim); color:var(--accent); }
  .genre-visible { opacity:1 !important; transform:scale(1) !important; transition:opacity 0.3s ease,transform 0.3s ease; }
  .idx-genre-icon { font-size:11px; opacity:0.7; }

  /* SCHEDULE */
  .idx-schedule-days { display:flex; gap:6px; overflow-x:auto; padding:0 var(--page-pad) 12px; scrollbar-width:none; }
  .idx-schedule-days::-webkit-scrollbar { display:none; }
  .idx-sday {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    flex-shrink:0; cursor:pointer; padding:8px 12px;
    border-radius:var(--radius-sm);
    background:var(--bg2); border:1px solid var(--border);
    transition:all 0.2s; min-width:52px;
  }
  .idx-sday.active { background:var(--accent-dim); border-color:var(--accent); }
  .idx-sday-circle { font-size:11px; font-weight:900; color:var(--text2); text-transform:uppercase; letter-spacing:0.3px; }
  .idx-sday.active .idx-sday-circle { color:var(--accent); }
  .idx-sday-dot { width:5px; height:5px; border-radius:50%; background:var(--text3); transition:background 0.2s; }
  .idx-sday.active .idx-sday-dot { background:var(--accent); }
  .idx-sday-label { display:none; }
  .idx-schedule-item { display:flex; align-items:center; gap:10px; padding:10px var(--page-pad); text-decoration:none; color:inherit; }
  .idx-schedule-thumb { width:54px; height:70px; border-radius:var(--radius-sm); overflow:hidden; flex-shrink:0; background:var(--bg2); }
  .idx-schedule-thumb img { width:100%; height:100%; object-fit:cover; }
  .idx-schedule-info { flex:1; min-width:0; }
  .idx-schedule-title { font-size:13px; font-weight:800; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:4px; }
  .idx-schedule-ep { font-size:11px; color:var(--accent); font-weight:700; }
  .idx-schedule-time { font-size:10px; color:var(--text3); font-weight:600; margin-top:3px; }

  /* CW STRIP */
  .cw-strip { display:flex; gap:10px; overflow-x:auto; padding:0 var(--page-pad) 4px; scrollbar-width:none; }
  .cw-strip::-webkit-scrollbar { display:none; }
  .cw-card { flex-shrink:0; width:140px; text-decoration:none; color:inherit; position:relative; }
  .cw-thumb { position:relative; width:100%; aspect-ratio:16/9; border-radius:var(--radius-sm); overflow:hidden; background:var(--bg2); margin-bottom:6px; }
  .cw-thumb img { width:100%; height:100%; object-fit:cover; }
  .cw-play-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.45); display:flex; align-items:center; justify-content:center; }
  .cw-play-overlay i { color:#fff; font-size:16px; }
  .cw-progress-bar { position:absolute; bottom:0; left:0; right:0; height:3px; background:rgba(255,255,255,0.15); }
  .cw-progress-fill { height:100%; background:var(--accent); }
  .cw-title { font-size:12px; font-weight:800; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; }
  .cw-ep-name { font-size:10px; color:var(--text3); font-weight:600; margin-top:1px; }
  .cw-meta { font-size:10px; color:var(--text3); display:flex; align-items:center; gap:4px; margin-top:2px; }
  .cw-del { position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.65); border:none; color:#fff; font-size:14px; line-height:1; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; z-index:2; }

  /* QUICK NAV */
  .quick-nav { display:flex; gap:8px; overflow-x:auto; padding:0 var(--page-pad) 4px; scrollbar-width:none; }
  .quick-nav::-webkit-scrollbar { display:none; }
  .quick-nav-item {
    display:inline-flex; align-items:center; gap:5px;
    background:var(--bg2); border:1px solid var(--border);
    border-radius:20px; padding:7px 13px;
    font-size:12px; font-weight:700; color:var(--text2);
    text-decoration:none; white-space:nowrap; flex-shrink:0; transition:all 0.2s;
  }
  .quick-nav-item .dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
  .quick-nav-item:active { background:var(--accent-dim); color:var(--accent); }

  /* BOTTOM NAV — Pill style */
  .bottom-nav {
    position:fixed; bottom:12px;
    left:50%; transform:translateX(-50%);
    z-index:200;
    background:rgba(20,20,22,0.55);
    backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
    border:1.5px solid rgba(232,65,90,0.5);
    border-radius:32px;
    display:flex; align-items:center;
    height:62px; padding:0 10px; gap:0;
    box-shadow:0 8px 40px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
    min-width:min(340px,calc(100vw - 28px));
    max-width:calc(100vw - 28px);
  }
  .bnav-item {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:4px; color:rgba(255,255,255,0.45);
    font-size:9px; font-weight:700; letter-spacing:0.3px; text-transform:uppercase;
    border:none; background:none;
    padding:6px 4px; border-radius:22px;
    cursor:pointer; transition:all 0.2s; min-height:46px;
    text-decoration:none;
  }
  .bnav-item i { font-size:17px; transition:transform 0.2s; }
  .bnav-item.active { color:#e8415a; }
  .bnav-item.active i { transform:scale(1.15); }
  .bnav-home-pill {
    width:72px; height:46px;
    background:#e8415a;
    border-radius:23px; display:flex; align-i
